services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: atomic_dev
      POSTGRES_USER: atomic
      POSTGRES_PASSWORD: atomic_dev
    ports:
      - "5434:5432"
    volumes:
      - atomic-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomic"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  atomic-dev-data:
