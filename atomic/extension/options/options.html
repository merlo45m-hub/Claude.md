<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Atomic Web Clipper Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <h1>Atomic Web Clipper</h1>
    <p class="subtitle">Configure your server connection</p>

    <div class="form-group">
      <label for="server-url">Server URL</label>
      <input type="text" id="server-url" placeholder="http://localhost:44380">
    </div>

    <div class="form-group">
      <label for="api-token">API Token</label>
      <input type="password" id="api-token" placeholder="Enter your API token">
    </div>

    <div class="form-group">
      <label for="database">Database</label>
      <div class="db-row">
        <select id="database">
          <option value="">(server default)</option>
        </select>
        <button class="btn-secondary" id="refresh-dbs" type="button">Refresh</button>
      </div>
      <p class="hint" id="db-hint">Click Refresh after setting server URL + token.</p>
    </div>

    <div class="button-row">
      <button class="btn-primary" id="save">Save</button>
      <button class="btn-secondary" id="test">Test Connection</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script src="options.js" type="module"></script>
</body>
</html>
