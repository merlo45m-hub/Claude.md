services:
  server:
    image: ghcr.io/kenforthewin/atomic-server:latest
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-}
      - ATOMIC_SETUP_TOKEN=${ATOMIC_SETUP_TOKEN:-}
      # SQLite memory tuning. Each database opens one writer + N read
      # connections, and every connection carries its own page cache, so
      # steady-state RAM scales as (1 + read_pool) × cache_kb × num_databases.
      # On a memory-constrained host (e.g. 8 GB) running several databases,
      # lower the read pool and read-cache budget. Defaults: pool=16,
      # write=64000 KiB, read=8000 KiB.
      - ATOMIC_SERVER_READ_POOL_SIZE=${ATOMIC_SERVER_READ_POOL_SIZE:-}
      - ATOMIC_SQLITE_CACHE_KB=${ATOMIC_SQLITE_CACHE_KB:-}
      - ATOMIC_SQLITE_READ_CACHE_KB=${ATOMIC_SQLITE_READ_CACHE_KB:-}
    volumes:
      - atomic-data:/data
    networks:
      - internal
    restart: unless-stopped

  web:
    image: ghcr.io/kenforthewin/atomic-web:latest
    networks:
      - internal
    restart: unless-stopped

  proxy:
    image: nginx:1.28-bookworm
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - server
      - web
    restart: unless-stopped

  litestream:
    image: litestream/litestream:0.3
    profiles:
      - backup
    volumes:
      - atomic-data:/data
      - ./docker/litestream.yml:/etc/litestream.yml:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID
      - LITESTREAM_SECRET_ACCESS_KEY
      - LITESTREAM_BUCKET
      - LITESTREAM_ENDPOINT
      - LITESTREAM_PATH
    entrypoint: ["litestream", "replicate", "-config", "/etc/litestream.yml"]
    depends_on:
      - server
    networks:
      - internal
    restart: unless-stopped

volumes:
  atomic-data:

networks:
  internal:
