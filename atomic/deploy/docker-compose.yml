# Atomic Cloud — production single-box stack (DEPLOY.md's single-pod topology).
#
# Three services on one droplet:
#   caddy        TLS termination (wildcard via Cloudflare DNS-01) + reverse proxy
#   postgres     the tenant cluster + control plane (pgvector), data on the
#                encrypted DO volume
#   atomic-cloud the pod image (cloud.dockerfile)
#
# Plus an opt-in monitoring profile (COMPOSE_PROFILES=monitoring in .env;
# runbook: MONITORING.md) that ships metrics to Grafana Cloud:
#   grafana-alloy      scrapes the pod's internal /metrics, postgres-exporter,
#                      and its own host (node) exporter; remote_writes to
#                      Grafana Cloud (config: alloy/config.alloy)
#   postgres-exporter  Postgres metrics (connections, autovacuum, per-DB sizes)
# Without the profile, `docker compose up` starts exactly the three services
# above and the monitoring services are inert.
#
# The app connects to Postgres DIRECTLY, no pgbouncer: the provisioning /
# migration / backup paths hold session advisory locks, which transaction
# pooling breaks (verified: provisioning hangs — see DEPLOY.md §6). At
# single-box launch scale the connection budget is handled by
# max_connections=200 + the app's own pool caps instead.
#
# Config comes from ./.env (copy .env.example) — never commit it.

name: atomic-cloud

services:
  caddy:
    build:
      context: .
      dockerfile: caddy.dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${ATOMIC_CLOUD_BASE_DOMAIN:?set in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set in .env}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?set in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - atomic-cloud

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    shm_size: 256mb
    # max_connections must cover the §6 fan-out (cached tenants × tenant pool
    # size + control pool + pg_dump); 200 is ample headroom for launch scale.
    #
    # pg_stat_statements is the query-performance ledger (top queries by
    # time/calls/IO, per database — so per tenant). track=all includes
    # queries inside functions; track_io_timing prices buffer reads in the
    # same view. Query it from any DB after CREATE EXTENSION there (one-time,
    # done in the control DB). Entries are per-(userid, dbid, queryid), so
    # the same statement across N tenant DBs is N rows — raise
    # pg_stat_statements.max well before tenant count × query shapes
    # approaches it.
    command: >-
      postgres
      -c max_connections=200
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
      -c track_io_timing=on
    environment:
      POSTGRES_USER: atomic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: postgres
    volumes:
      # The DO block-storage volume (encrypted at rest) mounted by cloud-init.
      - ${POSTGRES_DATA_DIR:-/mnt/atomic-data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomic -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 12

  atomic-cloud:
    # CI publishes this from cloud.dockerfile (.github/workflows/cloud-image.yml);
    # scripts/deploy.sh --build builds it on the box instead when the registry
    # image isn't available.
    image: ${ATOMIC_CLOUD_IMAGE:-ghcr.io/kenforthewin/atomic-cloud:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Composed here (not in .env) because env_file values are passed
      # verbatim — only the compose file interpolates ${POSTGRES_PASSWORD}.
      # Direct to Postgres (see header note); no sslmode on a same-host bridge.
      ATOMIC_CLOUD_CONTROL_URL: postgres://atomic:${POSTGRES_PASSWORD}@postgres:5432/atomic_cloud_control
      ATOMIC_CLOUD_CLUSTER_URL: postgres://atomic:${POSTGRES_PASSWORD}@postgres:5432/postgres
    # The internal metrics listener (ATOMIC_CLOUD_METRICS_BIND in .env; off
    # when unset). expose: documents the port on the compose network WITHOUT
    # publishing it on the host — grafana-alloy scrapes it, the internet
    # (and tenants) cannot reach it. Never move this to ports:.
    expose:
      - "9464"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── monitoring profile (COMPOSE_PROFILES=monitoring; see MONITORING.md) ──

  grafana-alloy:
    profiles: ["monitoring"]
    # :latest because the operator enables this profile interactively (it is
    # never started by an unattended deploy); pin to the tag you verified
    # once the stack is up.
    image: grafana/alloy:latest
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    environment:
      # Deliberately ${VAR:-} (not :?): compose interpolates the WHOLE file
      # before profiles apply, so a hard-required var here would break
      # `docker compose up` for deployments that never enable monitoring.
      # alloy fails loudly at start when they're empty — but only for
      # operators who opted into the profile.
      GRAFANA_CLOUD_OTLP_URL: ${GRAFANA_CLOUD_OTLP_URL:-}
      GRAFANA_CLOUD_OTLP_USER: ${GRAFANA_CLOUD_OTLP_USER:-}
      GRAFANA_CLOUD_OTLP_TOKEN: ${GRAFANA_CLOUD_OTLP_TOKEN:-}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy
      # Host (node-exporter-style) metrics via alloy's unix exporter: the
      # scaling doc's disk/CPU/RAM signals (#5, #8). Read-only mounts.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    depends_on:
      - atomic-cloud
      - postgres-exporter

  postgres-exporter:
    profiles: ["monitoring"]
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      # Same-host bridge, same no-sslmode rationale as the pod's URLs above.
      DATA_SOURCE_NAME: postgres://atomic:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
  alloy-data:
